<!DOCTYPE html>
<html>
<head>
  <title>Father's Photo Collage ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f4ff;

      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      width: 100%;
      background: #333;
      color: white;
      padding: 20px;
      margin: 0;
      text-align: center;
    }

    /* SLIDESHOW (CENTERED PROPERLY) */
    .slideshow {
      margin: 30px auto;
      position: relative;
      width: 80%;
      max-width: 600px;
      height: 400px;
    }

    .slideshow img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 15px;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }

    .slideshow img.active {
      opacity: 1;
    }

    /* BUTTONS */
    button {
      margin: 10px;
      padding: 10px 18px;
      border: none;
      background: #d10000;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: darkred;
    }

    /* MUSIC CONTROLS */
    .controls {
      margin: 10px;
      text-align: center;
    }

    /* COLLAGE */
    .collage-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      margin-top: 30px;
    }

    .collage {
      position: relative;
      width: 820px;
      height: 520px;
    }

    .photo {
      position: absolute;
      width: 170px;
      height: 170px;
      object-fit: cover;
      border: 6px solid white;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      border-radius: 10px;
      transition: transform 0.3s;
    }

    .photo:hover {
      transform: scale(1.15);
      z-index: 10;
    }

    .p1 { top: 30px;  left: 10px;  transform: rotate(-10deg); }
    .p2 { top: 50px;  left: 170px; transform: rotate(7deg); }
    .p3 { top: 20px;  left: 340px; transform: rotate(-6deg); }
    .p4 { top: 60px;  left: 510px; transform: rotate(9deg); }
    .p5 { top: 35px;  left: 680px; transform: rotate(-8deg); }

    .p6 { top: 240px; left: 20px;  transform: rotate(8deg); }
    .p7 { top: 220px; left: 190px; transform: rotate(-9deg); }
    .p8 { top: 260px; left: 350px; transform: rotate(6deg); }
    .p9 { top: 230px; left: 520px; transform: rotate(-7deg); }
    .p10 { top: 270px; left: 690px; transform: rotate(10deg); }
  </style>
</head>

<body>

<h1>Together ❤️</h1>

<a href="index.html">
  <button>⬅ Back</button>
</a>

<!-- SLIDESHOW -->
<div class="slideshow">
  <img src="photo1.JPG" class="active">
  <img src="photo2.JPG">
  <img src="photo3.JPG">
  <img src="photo4.JPG">
  <img src="photo5.JPG">
  <img src="photo6.JPG">
  <img src="photo7.JPG">
  <img src="photo8.JPG">
  <img src="photo9.JPG">
  <img src="photo10.JPG">
  
</div>

<!-- MUSIC -->
<div class="controls">
  <audio id="bgmusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <button onclick="toggleMusic()">🎵 Play / Pause Music</button>
</div>

<!-- COLLAGE -->
<div class="collage-wrapper">
  <div class="collage">

    <img src="photo1.JPG" class="photo p1">
    <img src="photo2.JPG" class="photo p2">
    <img src="photo3.JPG" class="photo p3">
    <img src="photo4.JPG" class="photo p4">
    <img src="photo5.JPG" class="photo p5">

    <img src="photo6.JPG" class="photo p6">
    <img src="photo7.JPG" class="photo p7">
    <img src="photo8.JPG" class="photo p8">
    <img src="photo9.JPG" class="photo p9">
    <img src="photo10.JPG" class="photo p10">

  </div>
</div>

<script>
/* SLIDESHOW */
let slides = document.querySelectorAll(".slideshow img");
let index = 0;

setInterval(() => {
  slides[index].classList.remove("active");
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
}, 2500);

/* MUSIC TOGGLE */
function toggleMusic() {
  let audio = document.getElementById("bgmusic");

  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}
</script>

</body>
</html>
