<!DOCTYPE html>
<html>
<head>
  <title>Father's Photo Collage ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f4ff;
      text-align: center;
    }

    h1 {
      background: #333;
      color: white;
      padding: 20px;
      margin: 0;
    }

    /* center container */
    .collage-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 700px;
    }

    .collage {
      position: relative;
      width: 600px;
      height: 600px;
    }

    .photo {
      position: absolute;
      width: 180px;
      height: 180px;
      object-fit: cover;
      border: 6px solid white;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      border-radius: 10px;
      transition: transform 0.3s;
    }

    .photo:hover {
      transform: scale(1.15);
      z-index: 10;
    }

    /* centered collage layout */
    .p1 { top: 40px; left: 60px; transform: rotate(-10deg); }
    .p2 { top: 30px; left: 240px; transform: rotate(8deg); }
    .p3 { top: 220px; left: 100px; transform: rotate(-6deg); }
    .p4 { top: 240px; left: 300px; transform: rotate(12deg); }
    .p5 { top: 130px; left: 170px; transform: rotate(-3deg); }

    a button {
      margin: 15px;
      padding: 10px 20px;
      border: none;
      background: #d10000;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Together ❤️</h1>

<a href="Father's Day.html"><button>⬅ Back</button></a>

<div class="collage-wrapper">
  <div class="collage">

    <img src="photo1.jpg" class="photo p1">
    <img src="photo2.jpg" class="photo p2">
    <img src="photo3.jpg" class="photo p3">
    <img src="photo4.jpg" class="photo p4">
    <img src="photo5.jpg" class="photo p5">

  </div>
</div>

<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

</body>
</html>
